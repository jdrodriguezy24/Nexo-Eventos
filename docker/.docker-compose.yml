services:
  app:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    image: nexo-app-image
    container_name: nexo-eventos-app
    ports:
      - "5000:5000"
      - "5173:5173"
    env_file:
      - ../.env
    environment:
      - NODE_ENV=development
      - PORT=5000
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nexo-network
    volumes:
      - ../:/usr/src/app
      - /usr/src/app/node_modules

  db:
    image: mysql:8.0
    container_name: nexo-eventos-db
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE}
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      timeout: 20s
      retries: 10
    restart: unless-stopped
    networks:
      - nexo-network

volumes:
  mysql_data:

networks:
  nexo-network:
    driver: bridge