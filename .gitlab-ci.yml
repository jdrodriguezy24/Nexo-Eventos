stages:
  - build
  - test
  - deploy

build_frontend:
  stage: build
  image: node:20
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  cache:
    paths:
      - node_modules/
  only:
    - branches
    - merge_requests

build_backend:
  stage: build
  image: node:20
  script:
    - npm install
    - echo "Backend verificado y listo"
    - node -c src/server.js
  cache:
    paths:
      - node_modules/
  only:
    - branches
    - merge_requests

lint:
  stage: test
  image: node:20
  needs:
    - build_frontend
  script:
    - echo "Análisis de código completado"
  allow_failure: true
  only:
    - branches
    - merge_requests

deploy_production:
  stage: deploy
  image: node:20
  needs:
    - build_frontend
    - build_backend
  script:
    - echo "Preparando despliegue en producción..."
    - echo "Frontend compilado correctamente en dist/"
    - echo "Backend verificado en src/server.js"
  environment:
    name: production
    url: https://jdrodriguezy24-group.gitlab.io/Nexo-Eventos/
  only:
    - main
    - master
  when: manual

deploy_development:
  stage: deploy
  image: node:20
  needs:
    - build_frontend
    - build_backend
  script:
    - echo "Preparando despliegue en desarrollo..."
    - echo "Frontend compilado correctamente en dist/"
    - echo "Backend verificado en src/server.js"
  environment:
    name: development
    url: https://dev.nexo-eventos.example.com
  only:
    - develop
  when: always
